<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VidKit Color Picker</title>

<style>
:root{
    --radius:12px;
    --border:#d9d9d9;
    --border-strong:#b8b8b8;
    --font:Inter,system-ui,sans-serif;
    --font-mono:JetBrains Mono,Consolas,monospace;
    --transition:.18s ease;
}

*,
*::before,
*::after{
    box-sizing:border-box;
}

body{
    margin:40px;
    font-family:var(--font);
    background:#fafafa;
    display:flex;
    justify-content:center;
}

.color-picker{
    width:290px;
    user-select:none;
}

.sv-area{
    position:relative;
    width:100%;
    aspect-ratio:1;
    border-radius:var(--radius);
    overflow:hidden;
    cursor:crosshair;
    background:red;
}

.sv-gradient{
    position:absolute;
    inset:0;
}

.sv-thumb{
    position:absolute;
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid white;
    box-shadow:
        0 0 0 1px rgba(0,0,0,.35),
        0 4px 10px rgba(0,0,0,.25);
    transform:translate(-50%,-50%);
    pointer-events:none;
    transition:left .03s linear,
               top .03s linear;
}

.hue{
    width:100%;
    margin-top:16px;
    appearance:none;
    height:10px;
    border-radius:999px;
    outline:none;
    cursor:pointer;
    background:
        linear-gradient(
            90deg,
            #ff0000,
            #ffff00,
            #00ff00,
            #00ffff,
            #0000ff,
            #ff00ff,
            #ff0000
        );
}

.hue::-webkit-slider-thumb{
    appearance:none;
    width:18px;
    height:18px;
    border-radius:50%;
    border:2px solid white;
    background:#fff;
    box-shadow:0 0 0 1px rgba(0,0,0,.25);
}

.row{
    display:flex;
    gap:10px;
    margin-top:16px;
    align-items:center;
}

.swatch{
    width:34px;
    height:34px;
    border-radius:8px;
    border:1px solid var(--border-strong);
    flex-shrink:0;
}

.hex{
    flex:1;
    padding:10px 12px;
    border-radius:8px;
    border:1px solid var(--border);
    font-family:var(--font-mono);
    font-size:13px;
    text-transform:uppercase;
}

.hex:focus{
    outline:none;
    border-color:#6b8cff;
}

.presets{
    display:flex;
    gap:8px;
    margin-top:14px;
    flex-wrap:wrap;
}

.preset{
    width:24px;
    height:24px;
    border-radius:7px;
    border:1px solid rgba(0,0,0,.08);
    cursor:pointer;
    transition:transform var(--transition);
}

.preset:hover{
    transform:scale(1.08);
}

.preset.active{
    outline:2px solid #222;
    outline-offset:2px;
}

.section-title{
    margin:18px 0 8px;
    font-size:12px;
    font-weight:600;
    color:#666;
    text-transform:uppercase;
    letter-spacing:.08em;
}

.recent-colors{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.recent{
    width:24px;
    height:24px;
    border-radius:7px;
    border:1px solid rgba(0,0,0,.08);
    cursor:pointer;
    transition:.15s;
}

.recent:hover{
    transform:scale(1.08);
}

.add-current{
    display:block;
    width:100%;
    margin-top:12px;
    padding:8px 10px;
    border-radius:8px;
    border:1px solid var(--border-strong);
    background:white;
    cursor:pointer;
    font-weight:600;
}

.add-current:hover{
    transform:translateY(-1px);
}
</style>
</head>

<body>

<div class="color-picker">

    <div class="sv-area" id="sv">

        <div class="sv-gradient" id="gradient"></div>

        <div class="sv-thumb" id="thumb"></div>

    </div>

    <input
        id="hue"
        class="hue"
        type="range"
        min="0"
        max="360"
        value="220">

    <div class="row">

        <div class="swatch" id="swatch"></div>

        <input
            id="hex"
            class="hex"
            spellcheck="false"
            value="#1F8FFF">

    </div>

    <h4 class="section-title">Recent</h4>

    <div class="recent-colors" id="recentColors"></div>

    <h4 class="section-title">Palette</h4>

    <div class="presets" id="paletteColors"></div>

    <h4 class="section-title">Saved</h4>

    <div class="recent-colors" id="savedColors"></div>

    <button id="addCurrent" class="add-current">+ Add Current</button>

</div>

<script>

const state={
    h:220,
    s:.88,
    v:1
};

const presets=[
"#E24B4A",
"#BA7517",
"#639922",
"#0F6E56",
"#185FA5",
"#7F77DD",
"#D4537E",
"#2C2C2A",
"#FFFFFF"
];

const RECENT_KEY = "vidkit_recent_colors";
const MAX_RECENT = 9;
const SAVED_KEY = "vidkit_saved_colors";
const MAX_SAVED = 50;

const els={
    sv:document.getElementById("sv"),
    gradient:document.getElementById("gradient"),
    thumb:document.getElementById("thumb"),
    hue:document.getElementById("hue"),
    swatch:document.getElementById("swatch"),
    hex:document.getElementById("hex"),
    presets:document.getElementById("presets")
};

els.recent = document.getElementById("recentColors");
els.palette = document.getElementById("paletteColors");
els.saved = document.getElementById("savedColors");
els.addCurrent = document.getElementById("addCurrent");

function hsvToRgb(h,s,v){

    const c=v*s;
    const x=c*(1-Math.abs((h/60)%2-1));
    const m=v-c;

    let r=0,g=0,b=0;

    if(h<60)[r,g,b]=[c,x,0];
    else if(h<120)[r,g,b]=[x,c,0];
    else if(h<180)[r,g,b]=[0,c,x];
    else if(h<240)[r,g,b]=[0,x,c];
    else if(h<300)[r,g,b]=[x,0,c];
    else[r,g,b]=[c,0,x];

    return{
        r:Math.round((r+m)*255),
        g:Math.round((g+m)*255),
        b:Math.round((b+m)*255)
    };
}

function rgbToHex(r,g,b){

    return "#"+[r,g,b]
        .map(v=>v.toString(16).padStart(2,"0"))
        .join("")
        .toUpperCase();

}

function hexToRgb(hex){

    hex=hex.replace("#","");

    return{
        r:parseInt(hex.substring(0,2),16),
        g:parseInt(hex.substring(2,4),16),
        b:parseInt(hex.substring(4,6),16)
    };

}

function rgbToHsv(r,g,b){

    r/=255;
    g/=255;
    b/=255;

    const max=Math.max(r,g,b);
    const min=Math.min(r,g,b);

    const d=max-min;

    let h=0;

    if(d!==0){

        switch(max){

            case r:
                h=((g-b)/d)%6;
                break;

            case g:
                h=(b-r)/d+2;
                break;

            default:
                h=(r-g)/d+4;

        }

        h*=60;

        if(h<0)
            h+=360;

    }

    return{

        h,

        s:max===0?0:d/max,

        v:max

    };

}

function getRecentColors(){

    return JSON.parse(
        localStorage.getItem(RECENT_KEY) || "[]"
    );

}

function saveRecentColor(hex){

    let list = getRecentColors();

    list = list.filter(c => c !== hex);

    list.unshift(hex);

    if(list.length > MAX_RECENT)
        list.length = MAX_RECENT;

    localStorage.setItem(
        RECENT_KEY,
        JSON.stringify(list)
    );

    renderRecentColors();

}

function renderRecentColors(){

    els.recent.innerHTML = "";

    getRecentColors().forEach(hex=>{

        const swatch=document.createElement("div");

        swatch.className="recent";

        swatch.style.background=hex;

        swatch.title=hex;

        swatch.onclick=()=>{

            const rgb=hexToRgb(hex);

            Object.assign(
                state,
                rgbToHsv(
                    rgb.r,
                    rgb.g,
                    rgb.b
                )
            );

            els.hue.value=state.h;

            render();

        };

        els.recent.appendChild(swatch);

    });

}

function getSavedColors(){

    return JSON.parse(
        localStorage.getItem(SAVED_KEY) || "[]"
    );

}

function addSavedColor(hex){

    let list = getSavedColors();

    list = list.filter(c => c !== hex);

    list.unshift(hex);

    if(list.length > MAX_SAVED)
        list.length = MAX_SAVED;

    localStorage.setItem(
        SAVED_KEY,
        JSON.stringify(list)
    );

    renderSavedColors();

}

function renderSavedColors(){

    els.saved.innerHTML = "";

    getSavedColors().forEach(hex=>{

        const swatch=document.createElement("div");

        swatch.className="recent";

        swatch.style.background=hex;

        swatch.title=hex;

        swatch.onclick=()=>{

            const rgb=hexToRgb(hex);

            Object.assign(
                state,
                rgbToHsv(
                    rgb.r,
                    rgb.g,
                    rgb.b
                )
            );

            els.hue.value=state.h;

            render();

        };

        els.saved.appendChild(swatch);

    });

}

function render(){

    const rgb=hsvToRgb(
        state.h,
        state.s,
        state.v
    );

    const hex=rgbToHex(
        rgb.r,
        rgb.g,
        rgb.b
    );

    els.swatch.style.background=hex;

    els.hex.value=hex;

    els.gradient.style.background=
`
linear-gradient(to top,#000,transparent),
linear-gradient(to right,#fff,hsl(${state.h} 100% 50%))
`;

    els.thumb.style.left=
        state.s*100+"%";

    els.thumb.style.top=
        (1-state.v)*100+"%";

    clearTimeout(render.saveTimer);

    render.saveTimer = setTimeout(()=>{
        saveRecentColor(hex);
    },250);

}

function setSV(clientX,clientY){

    const r=
        els.sv.getBoundingClientRect();

    state.s=Math.min(
        1,
        Math.max(
            0,
            (clientX-r.left)/r.width
        )
    );

    state.v=Math.min(
        1,
        Math.max(
            0,
            1-(clientY-r.top)/r.height
        )
    );

    render();

}

els.sv.addEventListener(
    "pointerdown",
    e=>{

        els.sv.setPointerCapture(
            e.pointerId
        );

        setSV(
            e.clientX,
            e.clientY
        );

    }
);

els.sv.addEventListener(
    "pointermove",
    e=>{

        if(e.buttons){

            setSV(
                e.clientX,
                e.clientY
            );

        }

    }
);

els.hue.addEventListener(
    "input",
    ()=>{
        state.h=+els.hue.value;
        render();
    }
);

els.hex.addEventListener(
    "change",
    ()=>{

        const value=
            els.hex.value.trim();

        if(!/^#?[0-9A-F]{6}$/i.test(value))
            return;

        const rgb=
            hexToRgb(value);

        Object.assign(
            state,
            rgbToHsv(
                rgb.r,
                rgb.g,
                rgb.b
            )
        );

        els.hue.value=
            state.h;

        render();

    }
);

presets.forEach(color=>{

    const div=
        document.createElement("div");

    div.className="preset";

    div.style.background=color;

    div.onclick=()=>{

        const rgb=
            hexToRgb(color);

        Object.assign(
            state,
            rgbToHsv(
                rgb.r,
                rgb.g,
                rgb.b
            )
        );

        els.hue.value=
            state.h;

        document
            .querySelectorAll(".preset")
            .forEach(x=>
                x.classList.remove("active")
            );

        div.classList.add("active");

        render();

    };

    els.palette.appendChild(div);

});

function renderPalette(){
    // no-op here: palette built from presets above
}

els.addCurrent.onclick = ()=>{

    const rgb=hsvToRgb(state.h,state.s,state.v);

    const hex=rgbToHex(rgb.r,rgb.g,rgb.b);

    addSavedColor(hex);

};

renderRecentColors();
renderSavedColors();
render();

</script>

</body>
</html>
